<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 海洋背景 -->
  <rect width="800" height="400" fill="#1e3a8a"/>
  
  <!-- 海浪 -->
  <path d="M0 300 Q 200 280, 400 300 T 800 300 L 800 400 L 0 400 Z" fill="#3b82f6"/>
  <path d="M0 250 Q 200 230, 400 250 T 800 250 L 800 300 L 0 300 Z" fill="#60a5fa"/>
  
  <!-- 美国驱逐舰 -->
  <rect x="100" y="200" width="80" height="20" fill="#9ca3af" rx="4"/>
  <rect x="120" y="180" width="10" height="20" fill="#6b7280"/>
  <circle cx="110" cy="210" r="3" fill="#ef4444"/>
  <circle cx="130" cy="210" r="3" fill="#ef4444"/>
  <circle cx="150" cy="210" r="3" fill="#ef4444"/>
  
  <!-- 中国无人艇 -->
  <rect x="500" y="220" width="40" height="10" fill="#dc2626" rx="2"/>
  <rect x="510" y="215" width="5" height="5" fill="#fbbf24"/>
  <rect x="550" y="225" width="35" height="8" fill="#dc2626" rx="2"/>
  <rect x="560" y="220" width="5" height="5" fill="#fbbf24"/>
  <rect x="590" y="218" width="45" height="12" fill="#dc2626" rx="2"/>
  <rect x="600" y="213" width="5" height="5" fill="#fbbf24"/>
  
  <!-- 稀土矿脉（海底） -->
  <ellipse cx="300" cy="350" rx="100" ry="30" fill="#8b5cf6"/>
  <ellipse cx="320" cy="340" rx="80" ry="25" fill="#a78bfa"/>
  <text x="300" y="345" text-anchor="middle" fill="white" font-size="12" font-family="Arial">稀土矿脉</text>
  
  <!-- 标题 -->
  <text x="400" y="50" text-anchor="middle" fill="white" font-size="24" font-family="Arial" font-weight="bold">南海危机</text>
</svg>