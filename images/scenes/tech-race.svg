<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tech-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a4a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#tech-bg)" />
  
  <!-- Tech Nodes -->
  <circle cx="200" cy="150" r="40" fill="#00ff88" filter="url(#glow)" opacity="0.8"/>
  <circle cx="400" cy="100" r="35" fill="#0088ff" filter="url(#glow)" opacity="0.7"/>
  <circle cx="600" cy="180" r="45" fill="#ff4488" filter="url(#glow)" opacity="0.9"/>
  <circle cx="300" cy="300" r="30" fill="#ffff00" filter="url(#glow)" opacity="0.6"/>
  <circle cx="500" cy="250" r="50" fill="#ff8800" filter="url(#glow)" opacity="0.8"/>
  
  <!-- Connection Lines -->
  <line x1="200" y1="150" x2="400" y2="100" stroke="#00ffcc" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="100" x2="600" y2="180" stroke="#00ccff" stroke-width="2" opacity="0.5"/>
  <line x1="600" y1="180" x2="500" y2="250" stroke="#ff66aa" stroke-width="2" opacity="0.5"/>
  <line x1="500" y1="250" x2="300" y2="300" stroke="#ffcc00" stroke-width="2" opacity="0.5"/>
  <line x1="300" y1="300" x2="200" y2="150" stroke="#ffaa44" stroke-width="2" opacity="0.5"/>
  
  <!-- Central Hub -->
  <circle cx="400" cy="350" r="60" fill="#ffffff" opacity="0.1"/>
  <circle cx="400" cy="350" r="40" fill="#00ff00" filter="url(#glow)" opacity="0.9"/>
  
  <!-- Tech Labels -->
  <text x="200" y="150" text-anchor="middle" dy="5" fill="white" font-family="Arial" font-size="12" font-weight="bold">AI</text>
  <text x="400" y="100" text-anchor="middle" dy="5" fill="white" font-family="Arial" font-size="12" font-weight="bold">Quantum</text>
  <text x="600" y="180" text-anchor="middle" dy="5" fill="white" font-family="Arial" font-size="12" font-weight="bold">Space</text>
  <text x="300" y="300" text-anchor="middle" dy="5" fill="white" font-family="Arial" font-size="12" font-weight="bold">Bio</text>
  <text x="500" y="250" text-anchor="middle" dy="5" fill="white" font-family="Arial" font-size="12" font-weight="bold">Cyber</text>
  <text x="400" y="350" text-anchor="middle" dy="5" fill="black" font-family="Arial" font-size="14" font-weight="bold">R&D</text>
  
  <!-- Grid Pattern -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#004488" stroke-width="0.5" opacity="0.3"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)" />
  
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" fill="#00ffcc" font-family="Arial" font-size="24" font-weight="bold" filter="url(#glow)">科技竞赛</text>
</svg>